<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>George Hendrick</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #fafaf8;
      color: #1a1a1a;
    }

    .container {
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 2rem 0 1.5rem;
      border-bottom: 1px solid #ddd;
    }

    header h1 {
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: 0.02em;
    }

    main {
      flex: 1;
      display: flex;
      overflow: hidden;
      padding: 2.5rem 0;
      gap: 3rem;
    }

    .companies {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .companies h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 0.75rem;
      font-family: sans-serif;
    }

    .companies ul {
      list-style: none;
    }

    .companies li {
      padding: 0.4rem 0;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .companies li .name {
      font-size: 1.05rem;
    }

    .companies li .role {
      font-size: 0.8rem;
      color: #888;
      font-family: sans-serif;
    }

    .photo {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
    }

    .photo img {
      width: 100%;
      display: block;
      object-fit: cover;
      border: 1px solid #ddd;
    }

    .photo .placeholder {
      width: 100%;
      aspect-ratio: 3/4;
      background: #e8e8e8;
      border: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-family: sans-serif;
      font-size: 0.8rem;
    }

    .socials {
      padding: 1rem 0;
      border-top: 1px solid #ddd;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .socials a {
      color: #555;
      text-decoration: none;
      font-family: sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.02em;
    }

    .socials a:hover {
      color: #1a1a1a;
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>George Hendrick</h1>
  </header>

  <main>
    <section class="companies">
      <div>
        <h2>Currently</h2>
        <ul>
          <li>
            <span class="name">Company Name</span>
            <span class="role">Role &mdash; 2023&ndash;present</span>
          </li>
        </ul>
      </div>
      <div>
        <h2>Previously</h2>
        <ul>
          <li>
            <span class="name">Company Name</span>
            <span class="role">Role &mdash; 2021&ndash;2023</span>
          </li>
          <li>
            <span class="name">Company Name</span>
            <span class="role">Role &mdash; 2019&ndash;2021</span>
          </li>
        </ul>
      </div>
      <div>
        <h2>Projects</h2>
        <ul>
          <li>
            <span class="name">Project Name</span>
            <span class="role">Description</span>
          </li>
        </ul>
      </div>
      <div>
        <h2>Education</h2>
        <ul>
          <li>
            <span class="name">Institution Name</span>
            <span class="role">Degree &mdash; Year</span>
          </li>
        </ul>
      </div>
    </section>

    <aside class="photo">
      <!-- Replace with: <img src="photo.jpg" alt="George Hendrick" /> -->
      <div class="placeholder">your photo here</div>
    </aside>
  </main>

  <footer class="socials">
    <a href="https://linkedin.com/in/yourhandle" target="_blank">LinkedIn</a>
    <a href="https://github.com/yourhandle" target="_blank">GitHub</a>
    <a href="https://twitter.com/yourhandle" target="_blank">Twitter</a>
    <a href="mailto:you@example.com">Email</a>
  </footer>

</div>
</body>
</html>
