  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    #bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .inner {
      display: flex;
      flex-direction: row;
      gap: 4rem;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 1100px;
      position: relative;
      z-index: 1;
    }

    /* ── Left column ── */

    .left {
      flex: 0 0 auto;
    }

    .name-block {
      margin-bottom: 2rem;
    }

    .name-block h1 {
      font-size: 2.25rem;
      font-weight: bold;
      color: #3b82f6;
      margin-bottom: 0.5rem;
    }

    .divider {
      height: 1px;
      background: #374151;
    }

    .section {
      margin-top: 2rem;
    }

    .section h2 {
      font-size: 1.5rem;
      font-weight: normal;
      color: #fff;
      margin-bottom: 1rem;
    }

    .section ul {
      list-style: none;
    }

    .section li a {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 0;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s ease;
    }

    .section li a:hover {
      transform: translateX(4px);
    }

    .section li a:hover .name {
      color: #60a5fa;
    }

    .section li .role {
      color: #6b7280;
      font-size: 0.85rem;
      width: 7rem;
      flex-shrink: 0;
    }

    .section li .logo {
      width: 24px;
      height: 24px;
      object-fit: contain;
      flex-shrink: 0;
      border-radius: 4px;
    }

    .section li .name {
      color: #fff;
      transition: color 0.2s ease;
    }

    .socials-row {
      margin-top: 2rem;
    }

    .socials {
      display: flex;
      gap: 1.25rem;
      margin-top: 1rem;
    }

    .socials a {
      color: #9ca3af;
      text-decoration: none;
      display: flex;
      align-items: center;
      transition: color 0.15s ease;
    }

    .socials a:hover {
      color: #60a5fa;
    }

    .socials a svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    /* ── Right column ── */

    .right {
      flex: 0 0 auto;
    }

    .right img {
      width: 280px;
      display: block;
      object-fit: cover;
      border: 1px solid #374151;
    }

    .right .placeholder {
      width: 280px;
      aspect-ratio: 3/4;
      background: #111;
      border: 1px solid #374151;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      font-size: 0.8rem;
    }

    @media (max-width: 700px) {
      body {
        align-items: flex-start;
        padding: 2rem 1.25rem;
      }

      .inner {
        flex-direction: column;
        gap: 2rem;
        align-items: flex-start;
      }

      .right {
        width: 100%;
      }

      .right img {
        width: 100%;
      }

      .right .placeholder {
        width: 100%;
        aspect-ratio: 3/4;
      }

      .name-block h1 {
        font-size: 1.75rem;
      }

      .section li .role {
        width: 6rem;
      }
    }
  </style>
</head>
<body>

<script>
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  let stars = [];
  let comets = [];
  let nextComet = 200;

  function initStars() {
    stars = [];
    for (let i = 0; i < 200; i++) {
      stars.push({
        x: Math.floor(Math.random() * canvas.width),
        y: Math.floor(Math.random() * canvas.height),
        size: Math.random() < 0.85 ? 2 : 3,
        opacity: 0.4 + Math.random() * 0.6,
        blinkCooldown: Math.floor(Math.random() * 400),
        blinkFrame: -1,
        blinkLen: 25 + Math.floor(Math.random() * 35),
      });
    }
  }

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initStars();
  }
  window.addEventListener('resize', resize);
  resize();

  function spawnComet() {
    const fromTop = Math.random() < 0.6;
    const speed = 4 + Math.random() * 3;
    const angle = (Math.PI / 8) + Math.random() * (Math.PI / 5);
    let x, y, dx, dy;

    if (fromTop) {
      x = Math.random() * canvas.width * 0.8;
      y = -10;
      dx = Math.cos(angle) * speed;
      dy = Math.sin(angle) * speed;
    } else {
      x = -10;
      y = Math.random() * canvas.height * 0.5;
      dx = Math.cos(angle) * speed;
      dy = Math.sin(angle) * speed;
    }

    comets.push({
      x, y, dx, dy,
      trail: [],
      maxTrail: 18 + Math.floor(Math.random() * 14),
    });
  }

  function drawFrame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Stars
    for (const s of stars) {
      let op = s.opacity;

      if (s.blinkCooldown > 0) {
        s.blinkCooldown--;
      } else if (s.blinkFrame === -1) {
        s.blinkFrame = 0;
      }

      if (s.blinkFrame >= 0) {
        const half = s.blinkLen / 2;
        if (s.blinkFrame < half) {
          op = s.opacity * (1 - s.blinkFrame / half);
        } else {
          op = s.opacity * ((s.blinkFrame - half) / half);
        }
        s.blinkFrame++;
        if (s.blinkFrame >= s.blinkLen) {
          s.blinkFrame = -1;
          s.blinkCooldown = 200 + Math.floor(Math.random() * 400);
        }
      }

      ctx.fillStyle = `rgba(255,255,255,${op.toFixed(2)})`;
      ctx.fillRect(s.x, s.y, s.size, s.size);
    }

    // Comet spawning
    if (--nextComet <= 0) {
      spawnComet();
      nextComet = 180 + Math.floor(Math.random() * 220);
    }

    // Comets
    for (let i = comets.length - 1; i >= 0; i--) {
      const c = comets[i];
      c.trail.unshift([Math.floor(c.x), Math.floor(c.y)]);
      if (c.trail.length > c.maxTrail) c.trail.pop();

      for (let j = 0; j < c.trail.length; j++) {
        const [tx, ty] = c.trail[j];
        const t = j / c.maxTrail;
        let r, g, b, a;

        if (j === 0) {
          r = 225; g = 240; b = 255; a = 1.0;
        } else if (t < 0.25) {
          r = 180; g = 210; b = 255; a = 1.0 - t * 1.5;
        } else if (t < 0.55) {
          const tt = (t - 0.25) / 0.3;
          r = 180 + Math.floor(75 * tt);
          g = Math.floor(180 * (1 - tt));
          b = Math.floor(255 * (1 - tt));
          a = 0.75 - t * 0.6;
        } else {
          const tt = (t - 0.55) / 0.45;
          r = 220; g = 40; b = 40;
          a = (1 - tt) * 0.35;
        }

        if (a <= 0.01) continue;
        ctx.fillStyle = `rgba(${r},${g},${b},${a.toFixed(2)})`;
        const sz = j === 0 ? 4 : t < 0.4 ? 3 : 2;
        ctx.fillRect(tx, ty, sz, sz);
      }

      c.x += c.dx;
      c.y += c.dy;

      if (c.x > canvas.width + 60 || c.y > canvas.height + 60 || c.x < -60) {
        comets.splice(i, 1);
      }
    }

    requestAnimationFrame(drawFrame);
  }

  drawFrame();
</script>
</body>
</html>
