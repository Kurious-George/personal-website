<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>George Hendrick</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #fafaf8;
      color: #1a1a1a;
    }

    .container {
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 2rem 0 1.5rem;
      border-bottom: 1px solid #ddd;
    }

    header h1 {
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: 0.02em;
    }

    main {
      flex: 1;
      display: flex;
      overflow: hidden;
      padding: 2.5rem 0;
      gap: 3rem;
    }

    .companies {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .companies h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 0.75rem;
      font-family: sans-serif;
    }

    .companies ul {
      list-style: none;
    }

    .companies li {
      padding: 0.4rem 0;
    }

    .companies li a {
      display: grid;
      grid-template-columns: 160px 32px 1fr;
      align-items: center;
      column-gap: 0.6rem;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s ease;
    }

    .companies li a:hover {
      transform: translateX(5px);
    }

    .companies li a:hover .name {
      color: #2563eb;
    }

    .companies li .role {
      font-size: 0.85rem;
      color: #888;
      font-family: sans-serif;
    }

    .companies li .logo {
      width: 28px;
      height: 28px;
      object-fit: contain;
      display: block;
      flex-shrink: 0;
      border-radius: 6px;
    }

    .companies li .logo-placeholder {
      width: 28px;
      height: 28px;
      background: #ddd;
      flex-shrink: 0;
      border-radius: 3px;
    }

    .companies li .name {
      font-size: 1rem;
      transition: color 0.15s ease;
    }

    .photo {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
    }

    .photo img {
      width: 100%;
      display: block;
      object-fit: cover;
      border: 1px solid #ddd;
    }

    .photo .placeholder {
      width: 100%;
      aspect-ratio: 3/4;
      background: #e8e8e8;
      border: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-family: sans-serif;
      font-size: 0.8rem;
    }

    .socials {
      padding: 1rem 0;
      border-top: 1px solid #ddd;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .socials a {
      color: #888;
      text-decoration: none;
      display: flex;
      align-items: center;
      transition: color 0.15s ease;
    }

    .socials a:hover {
      color: #2563eb;
    }

    .socials a svg {
      width: 20px;
      height: 20px;
      display: block;
    }
  </style>
</head>

<div class="container">

  <header>

      <div>

      <div>

          </li>
        </ul>
      </div>
    </section>
